<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Guess the Number</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a0f14;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }

        #game-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <!-- HTML UI overlay for input (hidden by default) -->
    <div id="game-ui" style="display: none; position: absolute; inset: 0; pointer-events: none;">
        <div style="position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); pointer-events: auto; text-align: center;">
            <input type="number" id="guessInput" placeholder="Your guess..."
                style="font-size: 22px; padding: 12px 18px; width: 180px; margin-bottom: 12px;
                       background: #2a1a10; color: #fff0dd; border: 2px solid #886633;
                       border-radius: 8px; outline: none; text-align: center;"
                min="1" />

            <button id="submitGuess"
                    style="font-size: 22px; padding: 12px 28px; background: #996633; color: #fff0dd;
                           border: 2px solid #cc8844; border-radius: 8px; cursor: pointer;">
                Submit
            </button>
        </div>
    </div>

    <!-- Phaser library -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>

    <!-- utility files -->
    <script src="utils/ButtonHelper.js"></script>

    <!-- scene files - load them BEFORE main.js -->
    <script src="scenes/MenuScene.js"></script>
    <script src="scenes/GameScene.js"></script>
    <script src="scenes/GameOverScene.js"></script>
    
    <!-- Main game file - must come LAST -->
    <script src="main.js"></script>

</body>
</html>
